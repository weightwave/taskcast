[build]
builder = "dockerfile"
dockerfilePath = "rust/Dockerfile"
dockerContext = "rust"
watchPatterns = ["rust/**"]

[deploy]
startCommand = "taskcast start --port ${PORT:-3721} --storage memory"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
