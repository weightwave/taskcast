name: Rust

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'rust/**'
      - 'packages/playground/**'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/**'
      - 'packages/playground/**'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - name: Build playground dist
        working-directory: .
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @taskcast/playground... build
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - name: Build playground dist
        working-directory: .
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @taskcast/playground... build
      - name: Run tests
        run: cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - name: Build playground dist
        working-directory: .
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @taskcast/playground... build
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: rust/lcov.info
          flags: rust
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
      - name: Build playground dist
        working-directory: .
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @taskcast/playground... build
      - name: Build release
        run: cargo build --release -p taskcast-cli
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: taskcast-linux-x86_64
          path: rust/target/release/taskcast

  integration:
    name: Integration Tests
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
      - name: Install Node dependencies
        run: pnpm install
      - name: Build TypeScript packages
        run: pnpm -r build
      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: taskcast-linux-x86_64
          path: rust/target/release/
      - name: Make binary executable
        run: chmod +x rust/target/release/taskcast
      - name: Run integration tests
        run: bash rust/tests/integration.sh
