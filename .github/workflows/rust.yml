name: Rust

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'rust/**'
      - 'packages/playground/**'
      - '.github/workflows/rust.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/**'
      - 'packages/playground/**'
      - '.github/workflows/rust.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'

env:
  CARGO_TERM_COLOR: always
  # sccache uses GHA cache as backend, shared across all jobs
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # Build playground dist once, share via artifact to all Rust jobs.
  # This eliminates redundant pnpm install + playground build from every job.
  prepare:
    name: Prepare Playground
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @taskcast/playground... build
      - uses: actions/upload-artifact@v4
        with:
          name: playground-dist
          path: packages/playground/dist
          retention-days: 1

  # check, test, coverage, and build have no dependencies between them
  # so they run fully in parallel. This trades runner minutes for wall-clock speed:
  # wall time ≈ max(prepare + jobs) instead of sum if serialized.
  # Do NOT merge these jobs — that would make CI slower.
  #
  # sccache (GHA cache backend) replaces Swatinem/rust-cache:
  # - Shares compiled crate artifacts across ALL jobs (not per-job isolation)
  # - Granularity is per-crate, not whole target directory
  # - First run populates the cache; subsequent runs (and parallel jobs) reuse it
  check:
    name: Check & Clippy
    needs: [prepare]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: actions/download-artifact@v4
        with:
          name: playground-dist
          path: packages/playground/dist
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    needs: [prepare]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: actions/download-artifact@v4
        with:
          name: playground-dist
          path: packages/playground/dist
      - name: Run tests
        run: cargo test --workspace

  coverage:
    name: Coverage
    needs: [prepare]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/download-artifact@v4
        with:
          name: playground-dist
          path: packages/playground/dist
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: rust/lcov.info
          flags: rust
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Release
    needs: [prepare]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: actions/download-artifact@v4
        with:
          name: playground-dist
          path: packages/playground/dist
      - name: Build release
        run: cargo build --release -p taskcast-cli
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: taskcast-linux-x86_64
          path: rust/target/release/taskcast

  integration:
    name: Integration Tests
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Build TypeScript packages
        run: pnpm -r build
      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: taskcast-linux-x86_64
          path: rust/target/release/
      - name: Make binary executable
        run: chmod +x rust/target/release/taskcast
      - name: Run integration tests
        run: bash rust/tests/integration.sh
