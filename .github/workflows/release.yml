name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release Rust/Docker (e.g. 0.3.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  DOCKER_IMAGE: mwr1998/taskcast-rs
  DASHBOARD_IMAGE: mwr1998/taskcast-dashboard

jobs:
  # ── npm publish via changesets ────────────────────────────────────────────
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      published: ${{ steps.detect-publish.outputs.published }}
      version: ${{ steps.detect-publish.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build + lint + test intentionally duplicates ci.yml here.
      # npm publish is near-irreversible — this ensures the exact checkout
      # passes all checks before publishing, independent of other workflows.
      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm ci:publish
          commit: "chore: release packages"
          title: "chore: release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changesets/action@v1 has a known bug with pnpm where it does not
      # set the `published` output even after a successful npm publish.
      # This step independently detects whether packages were published
      # by checking the npm registry for the current version.
      - name: Detect if packages were published
        id: detect-publish
        run: |
          # If changesets/action set its output, trust it
          if [ "${{ steps.changesets.outputs.published }}" = "true" ]; then
            VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' \
              | jq -r '.[] | select(.name == "@taskcast/cli") | .version')
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "changesets/action reported published=true (v$VERSION)"
            exit 0
          fi

          # Check if changeset files remain — if yes, a versioning PR was
          # created and no publish happened (correct to skip downstream)
          CHANGESET_COUNT=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CHANGESET_COUNT" -gt 0 ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Changesets found ($CHANGESET_COUNT) — versioning PR created, not published"
            exit 0
          fi

          # No changesets remain — the action should have published.
          # Verify against the npm registry.
          LOCAL_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "Local version: $LOCAL_VERSION"

          # Retry up to 3 times (npm registry eventual consistency)
          for i in 1 2 3; do
            NPM_VERSION=$(npm view @taskcast/cli version 2>/dev/null || echo "")
            if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
              echo "published=true" >> "$GITHUB_OUTPUT"
              echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
              echo "Detected publish: v$LOCAL_VERSION confirmed on npm"
              exit 0
            fi
            echo "Attempt $i: npm has '$NPM_VERSION', expected '$LOCAL_VERSION'. Retrying in 10s..."
            sleep 10
          done

          echo "published=false" >> "$GITHUB_OUTPUT"
          echo "Version $LOCAL_VERSION not found on npm after retries — publish may have failed"

  # ── Extract version from release output or dispatch input ────────────────
  get-version:
    needs: release
    if: >-
      ${{
        !cancelled() && (
          (needs.release.result == 'success' && needs.release.outputs.published == 'true') ||
          (needs.release.result == 'skipped' && github.event_name == 'workflow_dispatch')
        )
      }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ needs.release.outputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "ERROR: version not found" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ── Rust binary builds (5 platforms, native runners) ──────────────────────
  rust-build:
    needs: get-version
    if: ${{ !cancelled() && needs.get-version.result == 'success' && needs.get-version.outputs.version != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Build playground dist
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @taskcast/playground... build

      - name: Sync Rust version
        shell: bash
        run: bash scripts/sync-rust-version.sh

      - name: Build
        working-directory: rust
        run: cargo build --release -p taskcast-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ARCHIVE="taskcast-v${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "rust/target/${{ matrix.target }}/release" taskcast
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Archive = "taskcast-v${{ env.VERSION }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "rust/target/${{ matrix.target }}/release/taskcast.exe" -DestinationPath $Archive
          echo "ARCHIVE=$Archive" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  # ── Docker builds (2 platforms, native runners) ───────────────────────────
  docker-build:
    needs: get-version
    if: ${{ !cancelled() && needs.get-version.result == 'success' && needs.get-version.outputs.version != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Build playground dist
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @taskcast/playground... build

      - name: Copy playground dist for Docker
        run: cp -r packages/playground/dist rust/playground-dist

      - name: Sync Rust version
        run: bash scripts/sync-rust-version.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rust/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error

  # ── Docker manifest merge ─────────────────────────────────────────────────
  docker-merge:
    needs: [get-version, docker-build]
    if: ${{ !cancelled() && needs.docker-build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: docker-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          docker buildx imagetools create \
            -t "$DOCKER_IMAGE:$VERSION" \
            -t "$DOCKER_IMAGE:$MINOR" \
            -t "$DOCKER_IMAGE:latest" \
            $(printf "$DOCKER_IMAGE@sha256:%s " *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.DOCKER_IMAGE }}:${{ env.VERSION }}

  # ── Attach binaries to GitHub Release ─────────────────────────────────────
  attach-binaries:
    needs: [get-version, rust-build]
    if: ${{ !cancelled() && needs.rust-build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: /tmp/binaries
          merge-multiple: true

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          files: /tmp/binaries/*
          fail_on_unmatched_files: true

  # ── Update Homebrew tap ────────────────────────────────────────────────────
  update-homebrew:
    needs: [get-version, rust-build]
    if: ${{ !cancelled() && needs.rust-build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: /tmp/binaries
          merge-multiple: true

      - name: Clone homebrew-tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/weightwave/homebrew-tap.git /tmp/homebrew-tap

      - name: Update formula
        run: bash scripts/update-homebrew.sh "$VERSION" /tmp/binaries /tmp/homebrew-tap

      - name: Push to homebrew-tap
        working-directory: /tmp/homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/weightwave/homebrew-tap.git"
          git add Formula/taskcast.rb
          git commit -m "taskcast $VERSION"
          git push

  # ── Dashboard Docker builds (2 platforms, native runners) ─────────────────
  dashboard-docker-build:
    needs: get-version
    if: ${{ !cancelled() && needs.get-version.result == 'success' && needs.get-version.outputs.version != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DASHBOARD_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/dashboard-web/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.DASHBOARD_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=dashboard-${{ matrix.platform }}
          cache-to: type=gha,scope=dashboard-${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error

  # ── Dashboard Docker manifest merge ──────────────────────────────────────
  dashboard-docker-merge:
    needs: [get-version, dashboard-docker-build]
    if: ${{ !cancelled() && needs.dashboard-docker-build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: dashboard-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          docker buildx imagetools create \
            -t "$DASHBOARD_IMAGE:$VERSION" \
            -t "$DASHBOARD_IMAGE:$MINOR" \
            -t "$DASHBOARD_IMAGE:latest" \
            $(printf "$DASHBOARD_IMAGE@sha256:%s " *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.DASHBOARD_IMAGE }}:${{ env.VERSION }}
